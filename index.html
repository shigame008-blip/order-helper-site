<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Helper</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d7dde5;
      --text: #17202a;
      --muted: #657184;
      --accent: #1677ff;
      --accent-strong: #0f5fc9;
      --danger: #b42318;
      --ok: #137333;
      --warn: #a15c00;
      --shadow: 0 10px 25px rgba(18, 28, 45, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Tahoma, "Noto Sans Thai", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px 0;
    }

    .view-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .view-buttons button.active,
    .page-tab.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    .app {
      display: grid;
      grid-template-columns: 360px minmax(420px, 1fr) 420px;
      gap: 14px;
      min-height: calc(100vh - 54px);
      padding: 14px;
    }

    body.form-mode .app {
      grid-template-columns: 360px minmax(420px, 1fr);
    }

    body.form-mode .result-panel,
    body.form-mode .summary-panel,
    body.orders-mode .form-panel,
    body.orders-mode .summary-panel,
    body.summary-mode .form-panel,
    body.summary-mode .result-panel {
      display: none;
    }

    body.orders-mode .app,
    body.summary-mode .app {
      grid-template-columns: 1fr;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    h1, h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    h2 { font-size: 16px; }

    .body {
      padding: 14px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.45;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 119, 255, .12);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 9px 12px;
      cursor: pointer;
      min-height: 40px;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button:hover {
      border-color: #b9c3d0;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 26px;
      font-size: 13px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--line);
      flex: 0 0 auto;
    }

    .status.ok .dot { background: var(--ok); }
    .status.warn .dot { background: var(--warn); }
    .status.bad .dot { background: var(--danger); }

    .errors {
      margin: 0;
      padding-left: 20px;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.55;
    }

    .location-suggestions {
      display: none;
      margin: -4px 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .location-suggestions.show {
      display: block;
    }

    .location-suggestions .suggestion-head {
      padding: 8px 10px;
      color: var(--muted);
      font-size: 12px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }

    .location-suggestion {
      display: block;
      width: 100%;
      min-height: auto;
      padding: 9px 10px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      text-align: left;
      background: #fff;
      cursor: pointer;
    }

    .location-suggestion:hover {
      background: #eef5ff;
    }

    .output {
      min-height: 300px;
      white-space: pre-wrap;
      font-family: Tahoma, "Noto Sans Thai", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    .history {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
    }

    .page-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .order-count {
      color: var(--muted);
      font-size: 12px;
      margin-left: 4px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
      background: #fbfcfe;
      cursor: pointer;
    }

    .history-item:hover {
      border-color: var(--accent);
    }

    .history-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .line-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-left: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .line-status::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: currentColor;
      flex: 0 0 auto;
    }

    .line-status.sent { color: var(--ok); }
    .line-status.unsent { color: var(--danger); }

    .history-text {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 10px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fbfcfe;
    }

    .summary-card strong {
      display: block;
      margin-bottom: 6px;
    }

    .summary-total {
      font-size: 24px;
      font-weight: 700;
      margin: 4px 0;
    }

    .choice-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 40px;
      align-items: center;
    }

    .choice {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
    }

    .choice input {
      width: auto;
      margin: 0;
    }

    .hidden {
      display: none;
    }

    .admin-gate {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      background: #eef2f7;
      padding: 24px;
    }

    .admin-card {
      width: min(640px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, .12);
      padding: 24px;
    }

    .admin-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .admin-option {
      text-align: left;
      min-height: 108px;
      padding: 16px;
    }

    .admin-option strong {
      display: block;
      margin-bottom: 6px;
      font-size: 22px;
    }

    body.admin-locked .topbar,
    body.admin-locked .app {
      display: none;
    }

    .app-version {
      position: fixed;
      right: 12px;
      bottom: 10px;
      z-index: 80;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    @media (max-width: 1150px) {
      .app {
        grid-template-columns: 1fr;
      }
    }
</style>
</head>

      "กทม": "กรุงเทพมหานคร",
      "กรุงเทพ": "กรุงเทพมหานคร",
      "ชนบุรี": "ชลบุรี",
      "ชลบรี": "ชลบุรี",
      "ชลบุร": "ชลบุรี",
      "นครศรีธรรมราช์": "นครศรีธรรมราช",
      "สุราษธานี": "สุราษฎร์ธานี",
      "สุราษฎธานี": "สุราษฎร์ธานี"
    };
    const thaiLocationDataUrls = [
      "thai_locations.json",
      "https://raw.githubusercontent.com/thailand-geography-data/thailand-geography-json/main/src/geography.json"
    ];
    const thaiLocationCacheKey = "thaiLocationRowsV2";
    let thaiLocationRowsPromise = null;
    let locationSuggestTimer = null;

    const fallbackLocationRows = [
      { province: "กรุงเทพมหานคร", district: "ปทุมวัน", subdistrict: "ปทุมวัน", postalCode: "10330" },
      { province: "กรุงเทพมหานคร", district: "จตุจักร", subdistrict: "จันทรเกษม", postalCode: "10900" },
      { province: "กรุงเทพมหานคร", district: "สะพานสูง", subdistrict: "สะพานสูง", postalCode: "10240" },
      { province: "ชลบุรี", district: "เมืองชลบุรี", subdistrict: "บ้านสวน", postalCode: "20000" },
      { province: "ชลบุรี", district: "บ่อทอง", subdistrict: "บ่อทอง", postalCode: "20270" },
      { province: "ชลบุรี", district: "บ้านบึง", subdistrict: "หนองบอนแดง", postalCode: "20170" },
      { province: "ระยอง", district: "บ้านค่าย", subdistrict: "หนองละลอก", postalCode: "21120" },
      { province: "ระยอง", district: "เมืองระยอง", subdistrict: "ห้วยโป่ง", postalCode: "21150" },
      { province: "อุดรธานี", district: "เมืองอุดรธานี", subdistrict: "หมากแข้ง", postalCode: "41000" },
      { province: "สมุทรปราการ", district: "เมืองสมุทรปราการ", subdistrict: "ท้ายบ้าน", postalCode: "10270" },
      { province: "สงขลา", district: "เมืองสงขลา", subdistrict: "พะวง", postalCode: "90100" },
      { province: "ภูเก็ต", district: "ถลาง", subdistrict: "เทพกระษัตรี", postalCode: "83110" },
      { province: "เชียงใหม่", district: "สันป่าตอง", subdistrict: "ทุ่งต้อม", postalCode: "50120" },
      { province: "นราธิวาส", district: "ระแงะ", subdistrict: "ตันหยงมัส", postalCode: "96130" },
      { province: "ชัยภูมิ", district: "เกษตรสมบูรณ์", subdistrict: "", postalCode: "" },
      { province: "ปัตตานี", district: "มายอ", subdistrict: "สาคอบน", postalCode: "94140" }
    ];

    function normalizeDigits(text) {
      return text.replace(/[๐-๙]/g, (d) => thaiDigitMap[d] || d);
    }

    function compactThai(text) {
      return String(text || "").replace(/จังหวัด|จ\.|[\s.]/g, "");
    }

    function editDistance(a, b) {
      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i += 1) dp[i][0] = i;
      for (let j = 0; j <= b.length; j += 1) dp[0][j] = j;
      for (let i = 1; i <= a.length; i += 1) {
        for (let j = 1; j <= b.length; j += 1) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
        }
      }
      return dp[a.length][b.length];
    }

    function closestProvince(input) {
      const compact = compactThai(input);
      if (!compact || compact.length < 3) return "";
      if (provinceAliases[compact]) return provinceAliases[compact];
      const exact = canonicalProvinceNames.find((name) => compactThai(name) === compact);
      if (exact) return exact;

      let best = "";
      let bestDistance = Infinity;
      canonicalProvinceNames.forEach((name) => {
        const distance = editDistance(compact, compactThai(name));
        if (distance < bestDistance) {
          best = name;
          bestDistance = distance;
        }
      });
      return bestDistance <= 2 ? best : "";
    }

    function normalizePhoneInput(text) {
      const digits = normalizeDigits(String(text || "")).replace(/\D/g, "");
      if (digits.length === 9 && /^[689]/.test(digits)) return `0${digits}`;
      if (digits.length === 10 && /^0[689]/.test(digits)) return digits;
      if (digits.length > 10) {
        const mobile = digits.match(/0[689]\d{8}/);
        if (mobile) return mobile[0];
      }
      return digits;
    }

    function compactAddressPart(text) {
      return compactThai(text)
        .replace(/ตำบล|อำเภอ|จังหวัด|แขวง|เขต|รหัส|ไปรษณีย์/g, "")
        .replace(/\d{5}/g, "");
    }

    function compactLocationRows(rows) {
      return (rows || [])
        .map((row) => ({
          province: row.provinceNameTh || row.province || "",
          district: row.districtNameTh || row.district || "",
          subdistrict: row.subdistrictNameTh || row.subdistrict || "",
          postalCode: String(row.postalCode || row.zip_code || "")
        }))
        .filter((row) => row.province && row.district);
    }

    async function loadThaiLocationRows() {
      if (thaiLocationRowsPromise) return thaiLocationRowsPromise;
      thaiLocationRowsPromise = (async () => {
        try {
          const cached = localStorage.getItem(thaiLocationCacheKey);
          if (cached) return JSON.parse(cached);
        } catch (error) {
          localStorage.removeItem(thaiLocationCacheKey);
        }

        for (const url of thaiLocationDataUrls) {
          try {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), url.startsWith("http") ? 1800 : 800);
            const response = await fetch(url, { signal: controller.signal, cache: "force-cache" });
            clearTimeout(timer);
            if (!response.ok) throw new Error("location fetch failed");
            const rows = compactLocationRows(await response.json());
            if (!rows.length) throw new Error("location data empty");
            if (url === "thai_locations.json" && rows.length < 1000) throw new Error("location data sample only");
            try {
              localStorage.setItem(thaiLocationCacheKey, JSON.stringify(rows));
            } catch (error) {
              // The app can still use the in-memory rows even if browser storage is full.
            }
            return rows;
          } catch (error) {
            // Try the next source, then fall back to the built-in sample rows.
          }
        }
        return fallbackLocationRows;
      })();
      return thaiLocationRowsPromise;
    }

    function findBestLocationRow(address, rows) {
      const normalized = normalizeAddressText(address);
      const compact = compactAddressPart(normalized);
      const zip = (normalized.match(/\b\d{5}\b/) || [])[0] || "";
      let best = null;
      let bestScore = 0;

      (rows || fallbackLocationRows).forEach((row) => {
        const province = compactThai(row.province);
        const district = compactThai(row.district);
        const subdistrict = compactThai(row.subdistrict);
        let score = 0;
        if (zip && row.postalCode === zip) score += 5;
        if (province && compact.includes(province)) score += 4;
        if (district && compact.includes(district)) score += 4;
        if (subdistrict && compact.includes(subdistrict)) score += 5;
        if (!subdistrict && district && compact.includes(district)) score += 2;
        if (score > bestScore) {
          best = row;
          bestScore = score;
        }
      });

      return bestScore >= 7 ? { row: best, score: bestScore } : null;
    }

    function findLocationSuggestions(address, rows, limit = 5) {
      const normalized = normalizeAddressText(address);
      const compact = compactAddressPart(normalized);
      const zip = (normalized.match(/\b\d{5}\b/) || [])[0] || "";
      const seen = new Set();

      return (rows || fallbackLocationRows)
        .map((row) => {
          const province = compactThai(row.province);
          const district = compactThai(row.district);
          const subdistrict = compactThai(row.subdistrict);
          let score = 0;
          if (zip && row.postalCode === zip) score += 8;
          if (province && compact.includes(province)) score += 5;
          if (district && compact.includes(district)) score += 5;
          if (subdistrict && compact.includes(subdistrict)) score += 7;
          if (subdistrict && subdistrict.length >= 4 && compact.includes(subdistrict.slice(0, 4))) score += 2;
          return { row, score };
        })
        .filter((item) => item.score >= 7)
        .sort((a, b) => b.score - a.score)
        .filter((item) => {
          const key = `${item.row.subdistrict}|${item.row.district}|${item.row.province}|${item.row.postalCode}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0, limit);
    }

    function formatLocationRow(row) {
      const isBangkok = row.province === "กรุงเทพมหานคร";
      const subdistrict = row.subdistrict ? `${isBangkok ? "แขวง" : "ต."}${row.subdistrict}` : "";
      const district = row.district ? `${isBangkok ? "เขต" : "อ."}${row.district}` : "";
      const province = row.province ? `${isBangkok ? "" : "จ."}${row.province}` : "";
      return [subdistrict, district, province, row.postalCode].filter(Boolean).join(" ");
    }

    function hideLocationSuggestions() {
      const box = $("locationSuggestions");
      if (!box) return;
      box.classList.remove("show");
      box.innerHTML = "";
    }

    function escapeRegExp(value) {
      return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function stripExistingLocationParts(value, row) {
      let text = normalizeAddressText(value);
      const phone = extractPhone(text);
      if (phone) text = text.replace(new RegExp(escapeRegExp(phone), "g"), "");
      text = text.replace(/\b\d{5}\b/g, "");
      text = text.replace(/\s*(เก็บเงินปลายทาง|ชำระเงินปลายทาง|ปลายทาง)\s*$/g, "");

      const locationChunks = [
        /(?:ตำบล|ต\.|แขวง)\s*[ก-ฮะ-์]{2,30}/g,
        /(?:อำเภอ|อ\.|เขต)\s*[ก-ฮะ-์]{2,30}/g,
        /(?:จังหวัด|จ\.)\s*[ก-ฮะ-์]{2,30}/g
      ];
      locationChunks.forEach((pattern) => {
        text = text.replace(pattern, " ");
      });

      [row.subdistrict, row.district, row.province, ...provinceNames].filter(Boolean).forEach((name) => {
        text = text.replace(new RegExp(escapeRegExp(name), "g"), " ");
      });

      text = text.replace(/^[ก-ฮะ-์A-Za-z.'\s]{2,60}[.,]\s*(?=.*\d)/, "");
      return text.replace(/\s+/g, " ").trim();
    }

    function applyLocationRow(row) {
      const rawText = $("raw").value.trim();
      const rawPhone = extractPhone(rawText);
      if (!$("phone").value.trim() && rawPhone) {
        $("phone").value = rawPhone;
      }
      if (!$("customerName").value.trim()) {
        const name = extractName(rawText);
        if (name) $("customerName").value = name;
      }

      const candidate = $("address").value.trim() || extractAddress(rawText) || rawText;
      const base = stripExistingLocationParts(candidate, row);
      const location = formatLocationRow(row);
      const finalAddress = cleanAddressForOrder([base, location].filter(Boolean).join(" "));

      $("raw").value = finalAddress;
      $("address").value = finalAddress;
      hideLocationSuggestions();
      validateOnly();
      buildOrder();
    }

    function scheduleLocationSuggestionsFromRaw() {
      clearTimeout(locationSuggestTimer);
      const text = $("raw").value.trim();
      if (text.length < 6) {
        hideLocationSuggestions();
        return;
      }
      locationSuggestTimer = setTimeout(() => {
        const phone = extractPhone(text);
        const candidate = extractAddress(text) || normalizeAddressText(phone ? text.replace(phone, "") : text);
        showLocationSuggestionsForAddress(candidate);
      }, 350);
    }

    async function showLocationSuggestionsForAddress(address) {
      const box = $("locationSuggestions");
      if (!box) return;
      if (document.activeElement !== $("raw")) {
        hideLocationSuggestions();
        return;
      }
      const rows = await loadThaiLocationRows();
      const suggestions = findLocationSuggestions(address, rows);
      box.innerHTML = "";
      if (!suggestions.length) {
        hideLocationSuggestions();
        return;
      }

      const head = document.createElement("div");
      head.className = "suggestion-head";
      head.textContent = "เลือกตำบล/อำเภอ/จังหวัดที่ตรงกับลูกค้า";
      box.appendChild(head);

      suggestions.forEach(({ row }) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "location-suggestion";
        button.textContent = formatLocationRow(row);
        button.addEventListener("mousedown", (event) => event.preventDefault());
        button.addEventListener("click", () => applyLocationRow(row));
        box.appendChild(button);
      });
      box.classList.add("show");
    }

    function prefixLocationName(value, name, prefix) {
      if (!name || value.includes(`${prefix}${name}`) || value.includes(`${prefix}.${name}`)) return value;
      const pattern = new RegExp(`(^|\\s)(${name})(?=\\s|\\d{5}|$)`);
      const label = prefix.length === 1 ? `${prefix}.` : prefix;
      return value.replace(pattern, `$1${label}${name}`);
    }

    function locationPartsFromAddress(address, row = null) {
      const normalized = normalizeAddressText(address);
      const compact = compactAddressPart(normalized);
      const hasSubdistrictByText = /(ต\.|ตำบล|แขวง)/.test(normalized);
      const hasDistrictByText = /(อ\.|อำเภอ|เขต)/.test(normalized);
      const hasProvinceByText = /(จ\.|จังหวัด|กรุงเทพ|กทม)/.test(normalized) || provinceNames.some((p) => compactThai(p) && compact.includes(compactThai(p)));
      const rowMatch = row || findBestLocationRow(normalized, fallbackLocationRows)?.row;
      return {
        hasSubdistrict: hasSubdistrictByText || Boolean(rowMatch?.subdistrict && compact.includes(compactThai(rowMatch.subdistrict))),
        hasDistrict: hasDistrictByText || Boolean(rowMatch?.district && compact.includes(compactThai(rowMatch.district))),
        hasProvince: hasProvinceByText || Boolean(rowMatch?.province && compact.includes(compactThai(rowMatch.province))),
        row: rowMatch
      };
    }

    async function enhanceAddressWithThaiLocations(address) {
      let value = normalizeAddressText(address);
      const rows = await loadThaiLocationRows();
      const match = findBestLocationRow(value, rows);
      if (!match) return value;

      const { row } = match;
      const isBangkok = row.province === "กรุงเทพมหานคร";
      value = prefixLocationName(value, row.subdistrict, isBangkok ? "แขวง" : "ต");
      value = prefixLocationName(value, row.district, isBangkok ? "เขต" : "อ");
      if (row.province && !/(จ\.|จังหวัด|กรุงเทพ|กทม)/.test(value) && !value.includes(row.province)) {
        value = `${value} ${isBangkok ? row.province : `จ.${row.province}`}`;
      }
      if (row.postalCode && !/\b\d{5}\b/.test(value)) value = `${value} ${row.postalCode}`;
      return normalizeProvinceTypos(value).replace(/\s+/g, " ").trim();
    }

    function hasClearHouseNumber(address) {
      const value = normalizeAddressText(address);
      if (/(บ้านเลขที่|เลขที่)\s*\d{1,5}/.test(value)) return true;
      if (/(^|\s)\d{1,5}(\/\d{1,5})?([-\s]|$)/.test(value) && !/(^|\s)(ม\.|หมู่)\s*\d/.test(value)) return true;
      return /(^|\s)\d{1,5}(\/\d{1,5})?\s*(หมู่|ม\.|ซอย|ถนน|ต\.|ตำบล|แขวง|อ\.|อำเภอ|เขต|จ\.|จังหวัด)/.test(value);
    }

    function orderSignature(text) {
      const parsed = parseOrderText(text, currentPage().key);
      return {
        phone: normalizePhoneInput(parsed.phone),
        cod: String(parsed.cod || ""),
        address: compactAddressPart(parsed.address),
        product: compactThai(parsed.productLine)
      };
    }

    function findDuplicateOrder(text) {
      const target = orderSignature(text);
      const store = readOrderStore();
      const list = store[currentPage().key] || [];
      return list.find((item) => {
        if (editingOrder && item.id === editingOrder.id) return false;
        const other = orderSignature(item.text);
        if (target.phone && other.phone && target.phone === other.phone) return true;
        return target.cod && target.cod === other.cod && target.address && target.address === other.address && target.product === other.product;
      });
    }

    function normalizeProvinceTypos(text) {
      let value = String(text || "");
      Object.entries(provinceAliases).forEach(([wrong, correct]) => {
        value = value.replace(new RegExp(wrong, "g"), correct);
      });
      value = value.replace(/กรุงเทพมหานครมหานคร/g, "กรุงเทพมหานคร");
      value = value.replace(/พระนครศรี(?:พระนครศรี)+อยุธยา/g, "พระนครศรีอยุธยา");
      value = value.replace(/(^|[\s,])(?:จ\.|จังหวัด)?\s*อยุธยา(?=\s|,|\d{5}|$)/g, "$1จ.พระนครศรีอยุธยา");
      value = value.replace(/(จ\.|จังหวัด)\s*([ก-ฮะ-์]{3,24})/g, (match, prefix, name) => {
        const fixed = closestProvince(name);
        return fixed ? `${prefix}${fixed}` : match;
      });
      value = value.replace(/พระนครศรี(?:พระนครศรี)+อยุธยา/g, "พระนครศรีอยุธยา");
      return value;
    }

    function normalizeAddressText(text) {
      let value = normalizeDigits(String(text || ""));
      value = value.replace(/(^|\s)(?:ตำบล|ต\.?|ต)\s*([ก-ฮะ-์]{2,})/g, "$1ต.$2");
      value = value.replace(/(^|\s)(?:อำเภอ|อ\.?|อ)\s*([ก-ฮะ-์]{2,})/g, "$1อ.$2");
      value = value.replace(/(^|\s)(?:จังหวัด|จ\.?|จ)\s*([ก-ฮะ-์]{2,})/g, "$1จ.$2");
      value = value.replace(/ต\.\.+/g, "ต.");
      value = value.replace(/อ\.\.+/g, "อ.");
      value = value.replace(/จ\.\.+/g, "จ.");
      value = normalizeProvinceTypos(value);
      return value.replace(/\s+/g, " ").trim();
    }

    function currentPage() {
      return pages.find((p) => p.key === $("page").value) || pages[0];
    }

    function visiblePages() {
      if (!activeGroup) return pages;
      return pages.filter((page) => page.prefix === activeGroup.key);
    }

    function renderPageSelect() {
      $("page").innerHTML = "";
      visiblePages().forEach((page) => {
        const option = document.createElement("option");
        option.value = page.key;
        option.textContent = `${page.prefix} | ${page.page} | ${page.product}`;
        $("page").appendChild(option);
      });
    }

    function renderGroupOptions() {
      $("adminOptions").innerHTML = "";
      pageGroups.forEach((group) => {
        const button = document.createElement("button");
        button.className = "admin-option";
        button.type = "button";
        button.innerHTML = `<strong>${group.name}</strong>${group.description ? `<span class="small">${group.description}</span>` : ""}`;
        button.addEventListener("click", () => selectGroup(group.key));
        $("adminOptions").appendChild(button);
      });

    function selectGroup(groupKey) {
      activeGroup = pageGroups.find((group) => group.key === groupKey) || pageGroups[0];
      localStorage.setItem("activePageGroup", activeGroup.key);
      document.body.classList.remove("admin-locked");
      $("adminGate").style.display = "none";
      const topbarNote = document.querySelector(".topbar .small");
      if (topbarNote) topbarNote.textContent = `กลุ่มเพจ: ${activeGroup.name}`;
      renderPageSelect();
      const firstPage = visiblePages()[0];
      if (firstPage) {
        $("page").value = firstPage.key;
        $("page").dispatchEvent(new Event("change"));
        activeOrderPageKey = firstPage.key;
      }
      renderPageTabs();
      renderHistory();
      renderSummary();
    }

    function showGroupGate() {
      activeGroup = null;
      localStorage.removeItem("activePageGroup");
      document.body.classList.add("admin-locked");
      $("adminGate").style.display = "grid";
      renderGroupOptions();
    }

    function pageTitle(pageKey) {
      const page = pages.find((item) => item.key === pageKey) || pages[0];
      return `${page.prefix} | ${page.page}`;
    }

    function showView(view) {
      document.body.classList.toggle("form-mode", view === "form");
      document.body.classList.toggle("orders-mode", view === "orders");
      document.body.classList.toggle("summary-mode", view === "summary");
      $("formViewBtn").classList.toggle("active", view === "form");
      $("ordersViewBtn").classList.toggle("active", view === "orders");
      $("summaryViewBtn").classList.toggle("active", view === "summary");
    }

    function selectedCod() {
      const custom = $("customCod")?.value.trim();
      if (custom) return custom;
      return $("price").value.trim();
    }

    function selectedQty() {
      const custom = $("customQty")?.value.trim();
      if (custom) return Number(custom || 0);
      const page = currentPage();
      return Number(page.cod[selectedCod()] || 0);
    }

    function populatePriceOptions(page, selectedValue = "") {
      $("price").innerHTML = "";
      Object.entries(page.cod).forEach(([cod, qty]) => {
        const option = document.createElement("option");
        option.value = cod;
        option.textContent = `${cod} = ${qty} ชุด`;
        $("price").appendChild(option);
      });

      if (selectedValue && page.cod[selectedValue]) {
        $("price").value = selectedValue;
      }
    }

    function pageOptionValues(page) {
      if (page.type === "color") return page.colors || [];
      if (page.type === "size") return page.sizes || ["XL"];
      return [];
    }

    function getSelectedOptionText() {
      return $("color").value.trim();
    }

    function setSelectedOptionText(value) {
      const values = String(value || "")
        .split(/[,/ ]+/)
        .map((item) => item.trim())
        .filter(Boolean);

      [...$("optionChoices").querySelectorAll("input")].forEach((input) => {
        input.checked = values.includes(input.value);
      });

      syncOptionValue();
    }

    function syncOptionValue() {
      const selected = [...$("optionChoices").querySelectorAll("input:checked")].map((input) => input.value);
      $("color").value = selected.join(",");
      updateProductLine();
      validateOnly();
    }

    function populateOptionChoices(page, selectedValue = "") {
      const values = pageOptionValues(page);
      $("optionChoices").innerHTML = "";
      $("optionField").classList.toggle("hidden", !values.length);

      if (!values.length) {
        $("color").value = "";
        return;
      }

      $("optionLabel").textContent = page.type === "size" ? "ไซซ์" : "สี";
      const inputType = page.type === "size" ? "radio" : "checkbox";

    const addressStartPattern = /(?:บ้านเลขที่|เลขที่|หมู่บ้าน|อาคาร|หอพัก|ร้าน|ตลาด|ปั๊ม|ปตท|บริษัท|โรงงาน|ถนน|ซอย|ต\.|ตำบล|แขวง|อ\.|อำเภอ|เขต|จ\.|จังหวัด|\d{1,5}(?:\/\d{1,5})?)/;
    const addressNoisePattern = /(โปร|แถม|ส่งฟรี|ค่าส่ง|ขอบคุณ|คำสั่งซื้อ|รับทราบ|แอดมิน|สีไหนดี|รับสี|มีสี|ชุดเลย|ยอดรวม|ราคา|บาท|COD|ขอชื่อ|แจ้งชื่อ|เบอร์โทรที่แจ้ง|ชำระเงิน|เก็บเงินปลายทาง|ส่งโดย|ปิด|close)/;

    function cleanAddressForOrder(address) {
      let value = normalizeAddressText(address || "");
      value = value.replace(/\b0[689][\d\-\s().]{7,20}/g, " ");
      value = value.replace(/(?:โทร|เบอร์|เบอร์โทร|โทรศัพท์)\s*[:：.]?\s*$/g, " ");
      value = value.replace(/(?:COD|คำสั่งซื้อ|ยอดรวม|ยอด)\s*[:：.]?\s*\d{2,5}/gi, " ");
      value = value.replace(/\b\d{2,5}\s*บาท\b/g, " ");

      const startMatch = value.match(addressStartPattern);
      if (startMatch && startMatch.index > 0) {
        const before = value.slice(0, startMatch.index);
        if (addressNoisePattern.test(before)) {
          value = value.slice(startMatch.index);
        }
      }

      value = value.replace(/^(?:รับสี.*?|.*?ขอชื่อ.*?|.*?แจ้งชื่อ.*?)(?=(บ้านเลขที่|เลขที่|หมู่บ้าน|อาคาร|หอพัก|ร้าน|ตลาด|ปั๊ม|ปตท|บริษัท|โรงงาน|ถนน|ซอย|ต\.|ตำบล|แขวง|อ\.|อำเภอ|เขต|จ\.|จังหวัด|\d))/g, "");
      value = value.replace(/\s+(?:รับสี|สีไหนดี|โปร|ยอดรวม|ขอบคุณ|แจ้งชื่อ|ขอชื่อ|แอดมิน|คำสั่งซื้อ|รับทราบ|ส่งโดย|ราคา|บาท|ชำระเงิน|เก็บเงินปลายทาง|ปิด|close).*$/g, "");
      value = cleanAddressLine(value);
      return value.replace(/\s+/g, " ").trim();
    }

    function suspiciousAddressReasons(address) {
      const value = normalizeAddressText(address || "");
      const reasons = [];
      if (addressNoisePattern.test(value)) reasons.push("ที่อยู่ยังมีข้อความที่อาจไม่ใช่ที่อยู่ปนอยู่");
      if (value.length > 180) reasons.push("ที่อยู่ยาวผิดปกติ ควรเช็คก่อนสร้าง");
      return reasons;
    }

    function cleanAddressLine(line) {
      let value = normalizeAddressText(line.trim());
      if (!/(หมู่บ้าน|บ้านเลขที่|เลขที่|หมู่|ม\.|ซอย|ถนน|ต\.|ตำบล|อ\.|อำเภอ|จ\.|จังหวัด|เขต|แขวง|รหัส)/.test(value)) {
        value = value.replace(/^[^\d]{2,80}(?=\d)/g, "");
      }
      value = value.replace(/\b0[689][\d\-\s().]{7,20}/g, "");
      value = value.replace(/(?:โทร|เบอร์|เบอร์โทร|โทรศัพท์)\s*[:：.]?\s*$/g, "");
      value = value.replace(/\s*(เก็บเงินปลายทาง|ชำระเงินปลายทาง|ปลายทาง)\s*$/g, "");
      value = value.replace(/^ชื่อ\s*[-/]?\s*ที่อยู่จัดส่ง\s*[:：]?\s*/g, "");
      value = value.replace(/^ชื่อ\s*[-/]?\s*ที่อยู่\s*[:：]?\s*/g, "");
      value = value.replace(/^ที่อยู่\s*[:：]?\s*/g, "");
      value = value.replace(/^จัดส่ง(?:ไป)?ที่\s*/g, "");
      value = value.replace(/^ชื่อ\s+.*?(?=\d)/g, "");
      value = value.replace(/(?<=\d)ม(?=\d)/g, " ม.");
      value = value.replace(/(?<=\d)ต\s*/g, " ต.");
      value = value.replace(/ต(?=ใน)/g, " ต.");
      value = value.replace(/อ(?=เมื)/g, " อ.");
      provinceNames.forEach((province) => {
        if (province !== "กรุงเทพ" && province !== "กรุงเทพมหานคร") {
          value = value.replace(new RegExp(`จ(?=${province})`, "g"), " จ.");
        }
      });
      value = value.replace(/(^|\s)ต\s+/g, "$1ต.");
      value = value.replace(/(^|\s)อ\s+/g, "$1อ.");
      value = value.replace(/(^|\s)จ\s+/g, "$1จ.");
      value = normalizeAddressText(value);
      return value.replace(/\s+/g, " ").trim();
    }

    function addressScore(line) {
      if (!line) return 0;
      const bad = ["โปร", "แถม", "ส่งฟรี", "ค่าส่ง", "ขอบคุณ", "คำสั่งซื้อ", "รับทราบ", "แอดมิน", "สีไหนดี", "รับสี", "มีสี", "ชุดเลย"];
      if (bad.some((word) => line.includes(word))) return 0;

      let score = 0;
      if (/\d/.test(line)) score += 1;
      if (/\b\d{5}\b/.test(line)) score += 2;
      ["หมู่บ้าน", "บ้านเลขที่", "เลขที่", "หมู่", "ม.", "ซอย", "ถนน", "ต.", "ตำบล", "อ.", "อำเภอ", "จ.", "จังหวัด", "เขต", "แขวง"].forEach((word) => {
        if (line.includes(word)) score += 2;
      });
      if (provinceNames.some((p) => line.includes(p))) score += 3;
      return score;
    }

    function extractPhone(text) {
      const normalized = normalizeDigits(text);
      const matches = normalized.match(/0[689][\d\-\s().]{7,20}/g) || [];
      for (const match of matches) {
        const digits = normalizePhoneInput(match);
        if (digits.length === 10) return digits;
      }
      const loose = normalizePhoneInput(normalized);
      if (/^0[689]\d{8}$/.test(loose)) return loose;
      return "";
    }

    function extractCod(text) {
      const normalized = normalizeDigits(text);
      const orderMatch = normalized.match(/(?:คำสั่งซื้อ|COD|ยอดรวม|ยอด)\D{0,20}(\d{3,4})/i);
      if (orderMatch) return orderMatch[1];
      const moneyMatches = [...normalized.matchAll(/฿\s*(\d{3,4})|\b(\d{3,4})\s*บาท/g)];
      if (moneyMatches.length) return moneyMatches[moneyMatches.length - 1][1] || moneyMatches[moneyMatches.length - 1][2];
      return "";
    }

    function extractName(text) {
      const lines = normalizeDigits(text).split(/\n+/).map((line) => line.trim()).filter(Boolean);
      const nameLine = lines.find((line) => /^(ชื่อ|คุณ|นาย|นาง|น\.ส\.)/.test(line) && !/ที่อยู่|เบอร์|โทร/.test(line));
      if (nameLine) {
        return nameLine
          .replace(/^ชื่อ\s*[:：]?\s*/g, "")
          .replace(/^(คุณ|นาย|นาง|นางสาว|น\.ส\.)\s*/g, "")
          .trim();
      }

      for (const line of lines) {
        const cleaned = line
          .replace(/\b0[689][\d\-\s().]{7,20}/g, "")
          .replace(/\s*(เก็บเงินปลายทาง|ชำระเงินปลายทาง|ปลายทาง)\s*$/g, "")
          .trim();
        if (!cleaned || /\d/.test(cleaned)) continue;
        if (/^(หมู่บ้าน|บ้านเลขที่|เลขที่|หมู่|ม\.|ซอย|ถนน|ต\.|ตำบล|อ\.|อำเภอ|จ\.|จังหวัด|เขต|แขวง|รหัส|อาคาร|หอพัก|ร้าน|ตลาด|โรงงาน)/.test(cleaned)) {
          continue;
        }
        if (/ที่อยู่|เบอร์|โทร|รับสี|สี|โปร|ชุด|COD|ปลายทาง|ส่ง|ราคา|บาท/.test(cleaned)) continue;
        if (/^[ก-ฮะ-์A-Za-z.'\s]{2,60}$/.test(cleaned)) return cleaned.replace(/\s+/g, " ").trim();
      }

      return "";
    }

    function extractAddress(text) {
      const lines = normalizeDigits(text).split(/\n+/).map((line) => line.trim()).filter(Boolean);
      let best = "";
      let bestScore = 0;

      for (let i = 0; i < lines.length; i += 1) {
        const first = cleanAddressLine(lines[i]);
        if (!first || addressScore(first) <= 0) continue;

        const startLooksAddress = /(^\d+|หมู่บ้าน|บ้านเลขที่|เลขที่|หมู่|ม\.|ซอย|ถนน|ต\.|ตำบล|อ\.|อำเภอ|จ\.|จังหวัด|เขต|แขวง|รหัส)/.test(first);
        if (!startLooksAddress) continue;

        const parts = [first];
        for (let j = i + 1; j < Math.min(lines.length, i + 6); j += 1) {
          const raw = lines[j];
          const clean = cleanAddressLine(raw);
          if (!clean) continue;
          if (/0[689][\d\-\s().]{7,20}/.test(raw)) continue;
          if (/รับสี|มีสี|ขอชื่อ|แจ้งชื่อ|คำสั่งซื้อ|ยอดรวม|ขอบคุณ|ส่งโดย|ปิด|close/.test(raw)) break;
          if (addressScore(clean) <= 0 && !/\b\d{5}\b/.test(clean)) break;
          parts.push(clean);
        }

        const candidate = parts.join(" ");
        const score = addressScore(candidate) + candidate.length / 100;
        if (score > bestScore) {
          best = candidate;
          bestScore = score;
        }
      }

      const hasSubdistrict = /(ต\.|ตำบล|แขวง)/.test(best);
      const hasDistrict = /(อ\.|อำเภอ|เขต)/.test(best);
      const hasProvince = /(จ\.|จังหวัด|กรุงเทพ|กทม)/.test(best);
      const needsMoreParts = !hasSubdistrict || !hasDistrict || !hasProvince;

      if (best && needsMoreParts) {
        const extraParts = lines
          .map((line) => cleanAddressLine(line))
          .filter((line) => line && !best.includes(line))
          .filter((line) => /(ต\.|ตำบล|แขวง|อ\.|อำเภอ|เขต|จ\.|จังหวัด|กรุงเทพ|กทม|\b\d{5}\b)/.test(line));

        if (extraParts.length) {
          return normalizeProvinceTypos([best, ...extraParts].join(" ")).replace(/\s+/g, " ").trim();
        }
      }

      return best;
    }

    function extractColor(text, page) {
      const normalized = normalizeDigits(text).toLowerCase();
      if (page.type === "size") {
        if (/\bxl\b|ไซซ์\s*xl|ไซต์\s*xl|ขนาด\s*xl/i.test(normalized)) return "XL";
        if (/\bl\b|ไซซ์\s*l|ไซต์\s*l|ขนาด\s*l/i.test(normalized)) return "L";
        return "XL";
      }

      const colorNames = page.colors || [];
      const found = [];
      colorNames.forEach((color) => {
        const pos = normalized.indexOf(color);
        if (pos !== -1) found.push({ color, pos });
      });
      found.sort((a, b) => a.pos - b.pos);
      const unique = [...new Set(found.map((item) => item.color))];
      return unique.join(",") || page.defaultColor || "";
    }

    function colorProductText(page, qty, colorText) {
      if (page.type === "plain") return `${page.product} ${qty}`;
      if (page.type === "size") return `${page.product} ${colorText || "XL"}${qty}`;

      let colors = (colorText || page.defaultColor || "ดำ")
        .split(/[,/ ]+/)
        .map((color) => color.trim())
        .filter(Boolean);
      if (!colors.length) colors.push(page.defaultColor || "ดำ");
      if (colors.length > qty) colors = colors.slice(0, qty);

      const base = Math.floor(qty / colors.length);
      let rest = qty % colors.length;
      return `${page.product} ${colors.map((color) => {
        const amount = base + (rest > 0 ? 1 : 0);
        rest -= 1;
        return `${color}${amount}*`;
      }).join("")}`.replace(/\*$/, "");
    }

      if (($("customCod").value.trim() && !$("customQty").value.trim()) || (!$("customCod").value.trim() && $("customQty").value.trim())) errors.push("ถ้าใช้ราคาเอง ต้องกรอกทั้งราคาและจำนวน");
      if (!qty) errors.push("ยังไม่มีจำนวนสินค้า");

      setErrors(errors);

    function parseOrderText(text, pageKey) {
      const lines = text.split(/\n/);
      const first = lines[0] || "";
      const prefixMatch = first.match(/^([A-Z]+)(\d+)(.*)$/);
      const codMatch = text.match(/COD(\d+)/);
      const productMatch = text.match(/\*\*\*(.*)\*$/m);
      const fbLine = lines.find((line) => line.startsWith("FB ")) || "";
      const phoneLine = lines.find((line) => line.startsWith("T.")) || "";
      const codIndex = lines.findIndex((line) => line.startsWith("COD"));
      const fbIndex = lines.findIndex((line) => line.startsWith("FB "));
      return {
        pageKey,
        price: codMatch ? codMatch[1] : "",
        customCod: "",
        customQty: "",
        prefix: prefixMatch ? prefixMatch[1] : "",
        orderNo: prefixMatch ? prefixMatch[2] : "",
        customerName: prefixMatch ? prefixMatch[3] : "",
        fbName: fbLine.replace(/^FB\s*/, ""),
        phone: phoneLine.replace(/^T\./, ""),
        address: fbIndex !== -1 && codIndex !== -1 ? lines.slice(fbIndex + 1, codIndex).join("\n").trim() : "",
        productLine: productMatch ? productMatch[1].replace(/\*$/, "") : ""
      };
    }

    function readOrderStore() {

    function nextOrderNoForPage(pageKey) {
      const orders = readOrderStore()[pageKey] || [];
      let maxNo = 0;
      orders.forEach((order) => {
        const formNo = Number(order.form && order.form.orderNo);
        if (Number.isFinite(formNo) && formNo > maxNo) {
          maxNo = formNo;
          return;
        }
        const parsed = parseOrderText(order.text || order.title || "", pageKey);
        const parsedNo = Number(parsed.orderNo);
        if (Number.isFinite(parsedNo) && parsedNo > maxNo) {
          maxNo = parsedNo;
        }
      });
      return String(maxNo + 1);
    }

      const originalItem = originalIndex >= 0 ? originalList[originalIndex] : null;
      const item = {
        id: editingOrder ? editingOrder.id : `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        text,
        errors,
        form: getFormSnapshot(),
        pageKey: page.key,
        pageName: page.page,
        title: `${$("prefix").value}${$("orderNo").value} ${$("customerName").value || "ไม่ระบุชื่อ"}`,
        time: originalItem ? originalItem.time : new Date().toLocaleString("th-TH"),
        sentAt: originalItem ? originalItem.sentAt : undefined
      };

      if (editingOrder && originalItem && editingOrder.pageKey === page.key) {
        const list = store[page.key] || [];
        list[originalIndex] = item;
        store[page.key] = list;
      } else {
        if (editingOrder && store[editingOrder.pageKey]) {
          store[editingOrder.pageKey] = store[editingOrder.pageKey].filter((order) => order.id !== editingOrder.id);
        }
        const list = store[page.key] || [];
        list.unshift(item);
        store[page.key] = list.slice(0, 80);
      }

      writeOrderStore(store);
      activeOrderPageKey = page.key;
      editingOrder = null;
      updateEditModeUi();
      renderPageTabs();
      renderHistory();
      renderSummary();
    }

    async function createOrderAndOpenPage() {
      const shouldAdvance = !editingOrder;
      $("phone").value = normalizePhoneInput($("phone").value);
      $("address").value = await enhanceAddressWithThaiLocations($("address").value);
      const { text, errors } = buildOrder();
      const blockingErrors = await blockingOrderErrors();
      if (blockingErrors.length) {
        alert(`สร้างออเดอร์ไม่สำเร็จ\n\n${blockingErrors.map((error) => `- ${error}`).join("\n")}`);
        setErrors([...blockingErrors, ...errors.filter((error) => !blockingErrors.includes(error))]);
        return;
      }
      if (!hasClearHouseNumber($("address").value) && !confirm("ยังไม่เห็นบ้านเลขที่ชัดเจน\n\nถ้าลูกค้าให้ส่งที่ปั๊ม/ร้าน/ที่ทำงาน หรือไม่มีบ้านเลขที่จริง ๆ สามารถกดยืนยันเพื่อสร้างต่อได้")) {
        setErrors(["ยังไม่เห็นบ้านเลขที่ชัดเจน"]);
        return;
      }
      const duplicate = findDuplicateOrder(text);
      if (duplicate && !confirm(`ออเดอร์นี้อาจซ้ำกับรายการเดิม\n\n${duplicate.title}\n\nต้องการสร้างต่อหรือไม่?`)) {
        setErrors(["พบออเดอร์ที่อาจซ้ำ"]);
        return;
      }
      const suspiciousReasons = suspiciousAddressReasons($("address").value);
      if (suspiciousReasons.length && !confirm(`ที่อยู่อาจมีข้อความที่ไม่ใช่ที่อยู่ปนอยู่\n\n${suspiciousReasons.map((reason) => `- ${reason}`).join("\n")}\n\nต้องการยืนยันสร้างออเดอร์นี้หรือไม่?`)) {
        setErrors(suspiciousReasons);
        return;
      }
      saveOrderToCurrentPage(text, errors);
      await copyText(text);
      if (shouldAdvance) {
        $("orderNo").value = String((Number($("orderNo").value || 0) || 0) + 1);
      }
      clearFormFields();
      showView("form");
      $("copiedText").textContent = "สร้างออเดอร์และคัดลอกแล้ว";
      setTimeout(() => $("copiedText").textContent = "", 1600);
    }

    window.orderHelperCreateFromBot = async function orderHelperCreateFromBot(rawText, pageKey = "") {
      if (pageKey && pages.some((page) => page.key === pageKey)) {
        const targetPage = pages.find((page) => page.key === pageKey);
        const targetGroup = pageGroups.find((group) => group.key === targetPage.prefix);
        if (targetGroup && activeGroup?.key !== targetGroup.key) {
          activeGroup = targetGroup;
          localStorage.setItem("activePageGroup", activeGroup.key);
          document.body.classList.remove("admin-locked");
          $("adminGate").style.display = "none";
          renderPageSelect();
        }
        $("page").value = pageKey;
        $("page").dispatchEvent(new Event("change"));
      }

      $("raw").value = rawText || "";
      await fillFromRaw();

      const rows = await loadThaiLocationRows();
      const suggestions = findLocationSuggestions($("address").value || $("raw").value, rows, 1);
      if (suggestions.length) {
        applyLocationRow(suggestions[0].row);
      }

      $("phone").value = normalizePhoneInput($("phone").value);
      $("address").value = cleanAddressForOrder(await enhanceAddressWithThaiLocations($("address").value));
      const { text, errors } = buildOrder();
      const blockingErrors = await blockingOrderErrors();
      const suspiciousReasons = suspiciousAddressReasons($("address").value);
      const allErrors = [...blockingErrors, ...errors.filter((error) => !blockingErrors.includes(error)), ...suspiciousReasons];

      if (allErrors.length) {
        setErrors(allErrors);
        return { ok: false, errors: allErrors, text };
      }

      const duplicate = findDuplicateOrder(text);
      if (duplicate) {
        const duplicateError = `ออเดอร์นี้อาจซ้ำกับ ${duplicate.title}`;
        setErrors([duplicateError]);
        return { ok: false, errors: [duplicateError], text };
      }

      const shouldAdvance = !editingOrder;
      saveOrderToCurrentPage(text, errors);
      await copyText(text);
      if (shouldAdvance) {
        $("orderNo").value = String((Number($("orderNo").value || 0) || 0) + 1);
      }
      clearFormFields();
      return { ok: true, errors: [], text };
    };

    async function copyOutput() {
      const { text } = buildOrder();
      await copyText(text);
      $("copiedText").textContent = "คัดลอกแล้ว";
      setTimeout(() => $("copiedText").textContent = "", 1600);
    }

    async function copyCurrentOrder() {
      const text = $("output").value.trim();
      if (!text) return;
      await copyText(text);
      $("copiedText").textContent = "คัดลอกออเดอร์นี้แล้ว";
      setTimeout(() => $("copiedText").textContent = "", 1600);
    }

    function clearFormFields(clearOutput = false) {
      ["raw", "customerName", "fbName", "phone", "address"].forEach((id) => $(id).value = "");
      hideLocationSuggestions();
      if (clearOutput) $("output").value = "";
      if (!editingOrder) $("orderNo").value = nextOrderNoForPage(currentPage().key);
      if (!editingOrder && $("price").options.length) $("price").selectedIndex = 0;
      if (!editingOrder) {
        $("customCod").value = "";
        $("customQty").value = "";
      }
      setSelectedOptionText(currentPage().type === "size" ? "XL" : "");
      updateProductLine();
      validateOnly();
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const temp = document.createElement("textarea");
      temp.value = text;
      temp.style.position = "fixed";
      temp.style.left = "-9999px";
      temp.style.top = "0";
      document.body.appendChild(temp);
      temp.focus();
      temp.select();
      document.execCommand("copy");
      document.body.removeChild(temp);
    }

    async function saveHistory() {
      $("phone").value = normalizePhoneInput($("phone").value);
      $("address").value = await enhanceAddressWithThaiLocations($("address").value);
      const { text } = buildOrder();
      const wasEditing = Boolean(editingOrder);
      saveOrderToCurrentPage(text, validateOnly());
      if (wasEditing) {
        clearFormFields(true);
        showView("form");
        $("copiedText").textContent = "บันทึกออเดอร์ที่แก้ไขแล้ว";
        setTimeout(() => $("copiedText").textContent = "", 1600);
      } else {
        showView("orders");
      }
    }

    function renderPageTabs() {
      const store = readOrderStore();
      $("pageTabs").innerHTML = "";

      visiblePages().forEach((page) => {
        const count = (store[page.key] || []).length;
        const button = document.createElement("button");
        button.className = `page-tab ${page.key === activeOrderPageKey ? "active" : ""}`;
        button.innerHTML = `${page.prefix} ${page.page}<span class="order-count">${count}</span>`;
        button.addEventListener("click", () => {
          activeOrderPageKey = page.key;
          renderPageTabs();
          renderHistory();
        });
        $("pageTabs").appendChild(button);
      });
    }

    function renderHistory() {
      const store = readOrderStore();
      if (!activeOrderPageKey) activeOrderPageKey = currentPage().key;
      const history = store[activeOrderPageKey] || [];
      $("history").innerHTML = "";
      $("orderListTitle").textContent = `รายการในเพจ ${pageTitle(activeOrderPageKey)}`;

      if (!history.length) {
        $("output").value = "";
        const empty = document.createElement("div");
        empty.className = "small";
        empty.textContent = "ยังไม่มีออเดอร์ในเพจนี้";
        $("history").appendChild(empty);
        return;
      }

      $("output").value = history[0].text;
      history.forEach((item) => {
        const div = document.createElement("div");
        div.className = "history-item";
        const status = item.errors && item.errors.length ? `ต้องเช็ค ${item.errors.length} จุด` : "พร้อมใช้";
        const lineStatusClass = item.sentAt ? "sent" : "unsent";
        const lineStatusText = item.sentAt ? "ส่ง LINE แล้ว" : "ยังไม่ส่ง LINE";
        div.innerHTML = `
          <div class="history-title">${item.title} <span class="small">(${status})</span><span class="line-status ${lineStatusClass}">${lineStatusText}</span></div>
          <div class="history-text">${item.time} - ${item.text.replace(/\n/g, " ")}</div>
          <div class="actions" style="margin-top: 8px">
            <button class="edit-order-btn" type="button">แก้ไข</button>
            <button class="delete-order-btn" type="button">ลบ</button>
          </div>
        `;
        div.querySelector(".edit-order-btn").addEventListener("click", (event) => {
          event.stopPropagation();
          applyFormSnapshot(item);
        });
        div.querySelector(".delete-order-btn").addEventListener("click", (event) => {
          event.stopPropagation();
          if (!confirm(`ลบออเดอร์นี้?\n\n${item.title}`)) return;
          const latestStore = readOrderStore();
          latestStore[activeOrderPageKey] = (latestStore[activeOrderPageKey] || []).filter((order) => order.id !== item.id);
          writeOrderStore(latestStore);
          renderPageTabs();
          renderHistory();
          renderSummary();
        });
        div.addEventListener("click", () => {
          $("output").value = item.text;
          copyText(item.text);
          $("copiedText").textContent = "คัดลอกจากประวัติแล้ว";
          setTimeout(() => $("copiedText").textContent = "", 1600);
        });
        $("history").appendChild(div);
      });
    }

    function renderSummary() {
      const store = readOrderStore();
      $("summaryList").innerHTML = "";

      visiblePages().forEach((page) => {
        const orders = store[page.key] || [];
        const codCounts = {};
        const total = orders.reduce((sum, item) => {
          const match = item.text.match(/COD(\d+)/);
          if (!match) return sum;
          const cod = match[1];
          codCounts[cod] = (codCounts[cod] || 0) + 1;
          return sum + Number(cod);
        }, 0);
        const detail = Object.entries(codCounts)
          .sort((a, b) => Number(a[0]) - Number(b[0]))
          .map(([cod, count]) => `${cod} x ${count} = ${(Number(cod) * count).toLocaleString("th-TH")}`)
          .join("<br>");

        const card = document.createElement("div");
        card.className = "summary-card";
        card.innerHTML = `
          <strong>${page.prefix} | ${page.page}</strong>
          <div class="summary-total">${total.toLocaleString("th-TH")}</div>
          <div class="small">${orders.length} ออเดอร์</div>
          <div class="small" style="margin-top: 8px">${detail || "ยังไม่มีรายการ"}</div>
        `;
        $("summaryList").appendChild(card);
      });
    }

    function init() {
      renderGroupOptions();
      renderPageSelect();

      $("page").addEventListener("change", () => {
        const page = currentPage();
        $("prefix").value = page.prefix;
        $("orderNo").value = nextOrderNoForPage(page.key);
        populatePriceOptions(page);
        populateOptionChoices(page);
        updateProductLine();
        validateOnly();
      });

      $("price").addEventListener("change", () => {
        $("customCod").value = "";
        $("customQty").value = "";
        updateProductLine();
        validateOnly();
      });

      $("optionChoices").addEventListener("change", syncOptionValue);

      ["customerName", "fbName", "phone", "address", "prefix", "orderNo", "customCod", "customQty"].forEach((id) => {
        $(id).addEventListener("input", () => {
          updateProductLine();
          validateOnly();
        });
      });

      $("raw").addEventListener("input", scheduleLocationSuggestionsFromRaw);
      $("raw").addEventListener("paste", () => setTimeout(scheduleLocationSuggestionsFromRaw, 0));
      document.addEventListener("focusin", (event) => {
        const box = $("locationSuggestions");
        if (event.target !== $("raw") && box && !box.contains(event.target)) {
          hideLocationSuggestions();
        }
      });

      $("formViewBtn").addEventListener("click", () => showView("form"));
      $("ordersViewBtn").addEventListener("click", () => {
        renderPageTabs();
        renderHistory();
        showView("orders");
      });
      $("summaryViewBtn").addEventListener("click", () => {
        renderSummary();
        showView("summary");
      });

      $("parseBtn").addEventListener("click", fillFromRaw);
      $("buildBtn").addEventListener("click", createOrderAndOpenPage);
      $("copyBtn").addEventListener("click", copyOutput);
      $("copyCurrentOrderBtn").addEventListener("click", copyCurrentOrder);
      $("saveBtn").addEventListener("click", saveHistory);
      $("nextBtn").addEventListener("click", () => {
        $("orderNo").value = String((Number($("orderNo").value || 0) || 0) + 1);
        buildOrder();
      });
      $("clearBtn").addEventListener("click", () => {
        editingOrder = null;
        updateEditModeUi();
        clearFormFields(true);
      });
      $("clearHistoryBtn").addEventListener("click", () => {
        const store = readOrderStore();
        if (activeOrderPageKey) {
          store[activeOrderPageKey] = [];
          writeOrderStore(store);
        }
        renderPageTabs();
        renderHistory();
        renderSummary();
      });
      $("refreshSummaryBtn").addEventListener("click", renderSummary);
      $("changeGroupBtn").addEventListener("click", showGroupGate);

      $("page").dispatchEvent(new Event("change"));
      updateEditModeUi();
      activeOrderPageKey = currentPage().key;
      renderPageTabs();
      renderHistory();
      renderSummary();

      const savedGroup = localStorage.getItem("activePageGroup");
      if (savedGroup && pageGroups.some((group) => group.key === savedGroup)) {
        selectGroup(savedGroup);
      }
    }

    init();
  </script>
</body>
</html>
